  - name: Run "apt update"
    ansible.builtin.apt:
      update_cache: true
      cache_valid_time: 3600
  - name: Install required packages
    ansible.builtin.apt:
      name:
        - apt-transport-https
        - ca-certificates
        - curl
        - gnupg
        - software-properties-common
  - name: Create directory for Docker's GPG key
    ansible.builtin.file:
      path: /etc/apt/keyrings
      state: directory
      mode: '0755'
  - name: Download Docker GPG key
    ansible.builtin.get_url:
      url: https://download.docker.com/linux/ubuntu/gpg
      dest: /etc/apt/keyrings/docker.asc
      mode: '0644'
  - name: Print architecture variables
    ansible.builtin.debug:
      msg: 'Architecture: {{ ansible_facts["architecture"] }}, Codename: {{ ansible_facts["lsb"]["codename"] }}'
  - name: Add Docker repository
    ansible.builtin.apt_repository:
      repo: >-
        deb [arch={{ arch_mapping[ansible_facts["architecture"]] | default(ansible_facts["architecture"]) }}
        signed-by=/etc/apt/keyrings/docker.asc]
        https://download.docker.com/linux/ubuntu {{ ansible_facts["lsb"]["codename"] }} stable
      filename: docker
      state: present
  - name: Install Docker and related packages
    ansible.builtin.apt:
      name: "{{ item }}"
      state: present
      update_cache: true
    loop:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
  - name: Add Docker group
    ansible.builtin.group:
      name: docker
      state: present
  - name: Add user to Docker group
    ansible.builtin.user:
      name: '{{ ansible_facts["user_id"] }}'
      groups: docker
      append: true
  - name: Enable and start Docker services
    ansible.builtin.systemd:
      name: "{{ item }}"
      enabled: true
      state: started
    loop:
      - docker.service
      - containerd.service
